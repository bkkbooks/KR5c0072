front:
  text: 道德真經論卷之一二同卷得一
  hash: sha256:440d8975522e4d7e9c9be36df81e8262d1503a56a493826f197e3ba6d322a355
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0072_HFL_001-001a, image: hfl/0373/0373-004.png}
body:
  text: 司馬氏注太史公曰老子著書上下篇言道德之意後人因其篇首之文名上篇曰道下篇曰德夫道德連體不可偏舉今從本名道可道非常道名可名非常名世俗之談道者皆曰道體微妙不可名言老子以為不然曰道亦可言道耳然非常人之所謂道也名亦可強名耳然非常人之所謂名也常人之所謂道者凝滯於物所謂名者苛察繳繞無名天地之始有名萬物之母天地有形之大者也其始必因於無故名天地之始曰無萬物以形相生其生必因於有故名萬物之母曰有常無欲以觀其妙常有欲以觀其徼徼邊際也萬物既有則彼無者宜若無所用矣然聖人常存無不去欲以窮神化之微妙也無既可貴則彼有者宜若無所用矣然聖人常存有不去欲以立萬事之邊際也苟專用無而棄有則蕩然流散無復邊際所謂有之以為利無之以為用也此兩者同出而異名同謂之玄玄之又玄衆妙之門玄者非有非無微妙之極致也二章天下皆知美之為美斯惡已皆知善之為善斯不善已美善有迹為衆所知非美之至者也故有無之相生難易之相成長短之相形高下之相傾音聲之相和前後之相隨凡事有形迹者必不可齊不齊則爭爭則亂亂則窮故聖人不貴是以聖人處無為之事用智若禹之行水行其所無事行不言之教其身正不令而行萬物作焉而不辭心之出也物或未之物至而應無所辭拒生而不有存養萬物而不取以為己有為而不恃聖人於天下不能全無所為但不恃之以為己力耳功成不居不自滿假夫唯不居是以不去汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功不尚賢使民不爭賢之不可不尚人皆知之至其末流之弊則爭名而長亂故老子矯之欲人尚其實不尚其名也不貴難得之貨使民不為盜不見可欲使心不亂是以聖人之治虛其心使民無利欲之心實其腹足食也弱其志不敢爭奪強其骨盡力常使民無知無欲甘其食美其服不知其外更有何欲使夫知者不敢為也衆莫之應為無為則無不治矣為之使至於無為道沖而用之或不盈淵兮似萬物之宗深不可測常為物主挫其鋭鋒角猛露道所惡也解其紛事為煩亂道所鄙也和其光輝華顯赫道所賤也同其塵汙辱卑下道所貴也湛兮似或存湛然不動若有若亡吾不知誰子象帝之先言其先天地生物莫能踰天地不仁以萬物為芻狗芻狗祭祀之具也未用則貴已用則賤天生五材力盡而弊之有似不仁聖人不仁以百姓為芻狗天地之間其猶橐籥乎虛而不屈動而愈出橐排也籥樂籥橐籥之中空洞無情故虛而不可窮屈動而不可竭盡多言數窮不如守中能守中誠不言而信谷神不死中虛故曰谷不測故曰神天地有窮而道無窮故曰不死是謂玄牝玄者言其微妙牝者萬物之母玄牝之門是謂天地根天地由之以生綿綿若存用之不勤微而不絶若亡若存無物不用而未嘗勤勞天長地久天地所以能長且久者以其不自生故能長久凡有血氣之類皆營為以求生惟天地無為而自生是以聖人後其身而身先外其身而身存亦不一用力非以其無私邪故能成其私衆人之私小聖人之私大小之至者父子乖離不能保一身大之至者蠻夷率服享祚百世上善若水水善利萬物又不爭處衆人之所惡人惡卑也故幾於道道無水有故曰幾居善地若水處下心善淵深靚與善仁潤物言善信妍媸無隱政善治滌穢事善能任物圓方動善時隨時凝泮夫唯不爭故無尤爭者事之末也與物無競莫之怨惡何過之有故特美之恃而盈之不如其已恃勢恃位恃才恃德而自滿者不如無勢無位無才無德揣而鋭之不可長保揣知物情鋭求進入必將失之金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道四時更運功成則移載營魄抱一能無離乎專氣致柔能如嬰兒乎滌除玄覽能無疵乎愛民治國能無為乎善愛民者任其自生遂而勿傷善治國者任物以能不勞而成天門開闔能為雌乎明白四達能無知乎聰明睿智守之以愚生之畜之生而不有為而不恃長而不宰是謂玄德長謂下知有之宰謂有所制割三十輻共一轂當其無有車之用以其虛中受物故能以寡統衆埏埴以為器當其無有器之用埏和也埴土也鑿户牖以為室當其無有室之用故有之以為利無之以為用禮至於無體樂至於無聲刑至於無刑然後見道之用五色令人目盲五音令人耳聾五味令人口爽爽失也馳騁田獵令人心發狂難得之貨令人行妨皆以外傷內是以聖人為腹不為目故去彼取此腹內守目外慕寵辱若驚貴大患若身何謂寵辱寵為下得之若驚失之若驚是謂寵辱若驚為士者以道德為上爵祿為下上榮也下辱也衆人乃寵其辱操之則栗舍之則悲何謂貴大患若身吾所以有大患者為吾有身由有其身及吾無身歸之自然吾有何患色聲味貨身之大患也衆人乃貴之甚於身皆徇外而忘內故也故貴以身為天下者可以託天下矣愛以身為天下者可以寄天下矣夫貴重天下者天下亦貴重之愛利天下者天下亦愛利之未有輕賤殘賊天下而天下貴愛之者也故聖人之貴愛天下所以貴愛其身也如此則付以大器必能守之視之不見名曰夷無色聽之不聞名曰希無聲搏之不得名曰微無體此三者不可致詰故混而為一皆歸於無其上不皎其下不昧皎明也道之升萬物以生而不可見道之降萬物以息而未嘗亡繩繩兮不可名繩繩廷長之貌曰有曰無皆強名耳復歸於無物是謂無狀之狀無物之象欲言無邪則物由以成欲言有邪則不見其形無物之象是謂惚恍若有若無迎之不見其首無始隨之不見其後無終執古之道以御今之有古之道無也能知古始是謂道紀道以無為紀古之善為士者微妙玄通深不可識夫惟不識故強為之容但言其外貌可見者豫兮若冬涉川猶兮若畏四鄰儼兮其若客涣兮若冰之將釋敦兮其若朴曠兮其若谷渾兮其若濁有道之士外貌皆然孰能濁以靜之徐清孰能安以久之徐生保此道者不欲盈夫惟不盈是以能弊復成謙受益致虛極守靜篤萬物並作吾以觀其復萬物之動必復歸於靜夫物藝藝各復歸其根物出於無復入於無歸根曰靜靜曰復命物靜則從天命復命曰常誰能違天知常曰明動靜不失其時不知常妄作凶違理而動知常容虛靜則無不包容乃公無偏無黨公乃王為天下所歸往王乃天與天合德天乃道天法道道乃久無疆殁身不殆虛則無所違拒靜則無所侵犯何危之有太上下知有之莫知帝力其次親之譽之有迹其次畏之強以威服其次侮之威德皆亡信不足有不信猶其貴言猶當作由欲盡復其言必不能周功成事遂百姓曰我自然日出而作日入而息鑿井而飲耕田而食大道廢有仁義道者涵仁義以為體行之以誠不形於外故道之行則仁義隱道之廢則仁義彰知慧出有大偽小人依善而為惡六親不和有孝慈國家昏亂有忠臣六親父子兄弟夫婦也若六親自和國家自治則孝慈忠臣不知其所在矣魚不能相忘於江湖則濡沫之德生焉絶聖棄智民利百倍聖智所以利民也至其末流之弊乃或假聖智以害民故老子矯之云爾絶仁棄義民復孝慈孝慈仁義之本也絶巧棄利盜賊無有巧於利民聖智之本心也盜賊乃竊巧以利己此三者以為文而未足故令有所屬屬著也聖智仁義巧利皆古之善道也由後世徒用之以為文飾而內誠不足故令三者皆著於名而喪其實見素任真抱朴存本少私無我寡欲無求絶學無憂學之所以不可已者為求道也若棄本而逐末則勞而無功不若不學之無憂也唯之與阿相去幾何善之與惡相去何若人之所畏不可不畏唯則為恭阿則為慢在有道者觀之唯阿善惡同歸於無相去無幾然恭則人喜慢則人怒善則受福惡則致禍怒集禍來將喪其身亦不得不畏也人皆為之吾敢不為耶荒兮其未央哉恭與善皆細行聊以避害耳未足以為大道也大道廣遠不可量衆人熙熙如享太牢如登春臺以外物為悅我獨怕兮其未兆如嬰兒之未孩孩小兒笑也乘乘兮若無所歸衆人皆有餘務於多得而我獨若遺不有於物我愚人之心也哉純純兮俗人昭昭我獨若昏俗人察察我獨悶悶忽兮其若晦飄兮似無所止衆人皆以我獨頑似鄙我獨異於人而貴食母受乳哺於元和道德真經論卷之一
