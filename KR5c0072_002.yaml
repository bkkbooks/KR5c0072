front:
  text: 道德真經論卷之二
  hash: sha256:e92043e84d5c8ef8ecef2534bb4760f401ccbe224fe3a9b980f026f865a34e9f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0072_HFL_002-001a, image: hfl/0373/0373-022.png}
body:
  text: 司馬氏注孔德之容唯道是從道之為物唯恍唯惚惚兮恍其中有象恍兮惚其中有物窈兮冥其中有精其精甚真其中有信信驗也皆所謂無狀之狀自古及今其名不去以閲衆甫吾何以知衆甫之然哉以此曲則全強直自遂鮮不缺折枉則直塗雖曲而通諸夏則由諸川雖曲而通諸海則由諸窪則盈水息淵木消枝山殺瘦澤增肥弊則新衣錦尚絅少則得多則惑是以聖人抱一為天下式一少之極也不自見故明暗然而日彰不自是故彰稽于衆舍己從人不自伐故有功不自矜故長功名永久夫唯不爭故天下莫能與之爭古之所謂曲則全者豈虛言哉誠全而歸之沒身不殆希言自然知道者不言而諭故曰自然飄風不終朝驟雨不終日孰為此者天地天地尚不能久而況於人乎躁人多辭必不能安固於道故從事於道者同於道德者同於德失者同於失皆自得之同於道者道亦得之同於德者德亦得之同於失者失亦得之自然相應信不足有不信由其貴言跂者不立跨者不行心有所屬故不能兩存自見者不明自是者不彰自伐者無功自矜者不長皆外競而內亡其於道也曰餘食贅行物或惡之故有道者不處盛饌之餘本雖美更可穢也本雖有功而自伐更為疣贅也或惡之猶云或擊之也有物混成先天地生混然自成寂兮寥兮獨立而不改無與之匹故曰獨立變化終不失其常故曰不改周行而不殆周行無所不至而不危可以為天地母能生大形吾不知其名名以定形混然無形不可得而定字之曰道取於無物不由強名之曰大大曰逝逝曰遠遠曰反故道大天大地大王亦大域中有四大而王居其一焉明王者不得以位自驕人法地地法天天法道道法自然重為輕根靜為躁君是以君子終日行不離輜重守重靜以為本雖有榮觀燕處超然不以為意奈何萬乘之主而以身輕天下輕則失臣躁則失君君輕躁則臣不畏臣輕躁則君賤之善行者無轍迹善言者無瑕謫善計者不籌算知其必然善閉者無關楗而不可開固國不以山溪之險善結者無繩約而不可解域民不以封疆之界是以聖人常善救人故無棄人常善救物故無棄物是謂襲明故善人者不善人之師不善人者善人之資不貴其師不愛其資雖知大迷是謂要妙知其雄守其雌有武而不用為天下溪處卑而為衆所歸為天下溪常德不離復歸於嬰兒由德以歸道知其白守其黑白清潔黑濁惡為天下式為天下式常德不忒復歸於無極知其榮守其辱為天下谷為天下谷常德乃足復歸於朴朴散則為器聖人用之則為官長材見於外則如器各有所能聖人因其所能用為衆官之長故大制不割因其自然將欲取天下而為之者吾見其不得已天下神器不可為也為者敗之執者失之為之則傷自然執之則乖變通故物或行或隨或詬或吹或強或羸或載或墮載成也此皆物自然之性是故聖人去甚去奢去泰任物自然但去此三者而已以道佐人主者不以兵強天卜其事好還物極則反故曰好還師之所處荆棘生焉大軍之後必有凶年明兵者凶器故善者果而已不敢以取強果猶成也功成則已果而勿矜果而勿驕果而勿伐果而不得已是果而勿強物壯則老是謂不道不道早已明強者不得久夫佳兵者不祥之器兵愈佳則害人愈多物或惡之故有道者不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬淡為上勝而不美若美之者是樂殺人夫樂殺人者不可以得志於天下矣故吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之殺人衆多以悲哀泣之戰勝則以喪禮處之此言兵之不祥道常無名不可指的朴雖小朴者道之質天下不敢臣言其尊侯王若能守萬物將自賔天地相合以降甘露民莫之令而自均侯王守道則物服氣和民化始制有名聖人得道必制而用之不能無言名亦既有夫亦將知止知止所以不殆雖以有名教民亦務簡要勿令滋彰譬道之在天下猶川谷之與江海有為之教比之於道大小絶殊然亦終歸於道知人者智自知者明勝人者有力自勝者強自知自勝尤難知足者富常足強行者有志不失其所者久得所則安死而不亡者壽身沒道存大道泛兮其可左右言無執萬物恃之以生而不辭皆與之功成而不居衣被萬物而不為主故常無欲可名於小矣易足萬物歸焉而不知主可名於大矣是以聖人終不為大故能成其大執大象天下往道之見者謂之象聖人執之以為天下王往而不害安平泰不以有為害之樂與餌過客止衆人凝滯於物道之出口淡乎其無味視之不足見聽之不足聞異於樂餌用之不可餌虛而不屈將欲歙之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之是謂微明知微之明柔弱勝剛強魚不可脫於淵國之利器不可以示人道常無為而無不為侯王若能守萬物將自化化而欲作作動也吾將鎮之以無名之朴無名之朴亦將不欲兼忘無欲以靜天下將自正道德真經論卷之二
