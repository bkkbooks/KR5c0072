front:
  text: 道德真經論卷之四
  hash: sha256:82d7e66b8094b067e88ca36708623a75935c626452c44ea8555246df1989d5af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0072_HFL_004-001a, image: hfl/0373/0373-050.png}
body:
  text: 司馬氏注治人事天莫若嗇省嗇精神夫唯嗇是謂早復早復謂之重積德不遠而復不離於德可以修身重積德則無不克念德不怠庸可敵平無不克則莫知其極廣運莫知其極可以有國然後能保其國家有國之母可以長久母謂存神育德是謂深根固蒂長生久視之道治大國若烹小鮮擾之則爛以道蒞天下其鬼不神物各得其所無妖灾非其鬼不神其神不傷人寒暑風雨變化生成非其神不傷人聖人亦不傷人聖人與鬼神合其吉凶夫兩不相傷故德交歸焉民神之主也聖人不傷人則神亦不傷矣大國下流天下之交天下之牝交猶歸聚也言大國所以為王霸下流所以為江海皆以此牝常以靜勝牡以其靜為之下覆解牝之為德故大國以下小國則取小國小國以下大國則取大國故或下以取或下而取以取取人而取為人所取大國不過欲兼畜人小國不過欲入事人兩者各得其所欲故大者宜為下畏天者保其國樂天者保天下道者萬物之奧也妙萬物而為言善人之所寶守而用之不善人之所保依於有道以自安美言可以市尊行可以加人美而言之可以使人從教若市之得物尊而行之可以使人心服必不為人下人之不善何棄之有所貴於道者為其兼容敦化若中者棄不中才者棄不才不得為有德故立天子置三公立君以司牧其民置輔以師保其君雖有拱璧以先駟馬不如坐進此道拱璧璧大如拱也古者進物必有以先之寶用有盡道用無窮古之所以貴此道者何不曰求以得有罪以免邪故為天下貴有求而循道者無不得有過而從道者無不免為無為事無事味無味大小多少報怨以德視小若大視少若多犯而不校圖難於其易為大於其細天下難事必作於易天下大事必作於細是以聖人終不為大故能成其大兢兢業業一日二日萬幾故能無為而治夫輕諾必寡信故子路無宿諾多易必多難小人先易而後難是以聖人由難之故終無難矣君子先難而後易其安易持其未兆易謀其脆易破其微易散為之於未有治之於未亂合抱之木生於豪末九層之臺起於纍土千里之行始於足下皆言防微愼始為者敗之傷自然執者失之滯於物是以聖人無為故無敗無成無虧無執故無失無喪無得民之從事常於幾成而敗之愼終如始則無敗事是以聖人欲不欲不貴難得之貨聖人所欲者不欲也故不貴珍竒學不學復衆人之所過以輔萬物之自然而不敢為衆人用心過分更成贅疣故人所學者在於不學以復衆人之所過萬物生成皆不出自然聖人但以輔之不敢强有所為也古之善為道者非以明民將以愚之去華務實還淳反朴民之難治以其智多姦詐亂政故以智治國國之賊上下相欺不以智治國國之福王道正直知此兩者亦楷式也常知楷式是謂玄德知用智不若不用非有精微之德其孰能與於此玄德深矣遠矣與物反矣乃復至於大順物情莫不貴智而有玄德者獨賤之雖反於物乃順於道江海所以能為百谷王者以其善下之故能為百谷王是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不害是以天下樂推而不厭以其不爭故天下莫能與之爭滿招損謙受益天下皆謂我道大似不肖肖似也言異於衆人夫唯大故似不肖若肖久矣其細也夫我有三寶保而持之一曰慈二曰儉三曰不敢為天下先夫慈故能勇仁者必有勇儉故能廣約省則有餘不敢為天下先故能為成器長成器猶成法也為衆教之父故曰為成器長今捨其慈且勇捨其儉且廣捨其後且先死矣必為物所害夫慈以戰則勝以守則固仁者衆之所附天將救之以慈衛之人不忍傷善為士者不武以德服人善戰者不怒我徂惟求定善勝敵者不爭不戰而屈人兵善用人者為之下得其歡心是謂不爭之德是謂用人之力是謂配天古之極也德與天合自生民以來無以加也用兵有言吾不敢為主而為客主謂以强兵為己任客謂人加於己已不得已而應之不敢進寸而退尺謙而不貪是謂行無行不行而自至攘無臂無臂而可以攘人仍無敵敵自服不必仍執無兵不執兵而全勝禍莫大於輕敵輕敵則幾喪吾寶寶謂三寶故抗兵相加哀者勝矣辭直而不爭者為衆所哀吾言甚易知甚易行易簡天下莫能知莫能行精一言有宗體要事有君返本夫唯無知是以不我知有知則知道矣知我者希則我貴矣道大故知之者鮮是以聖人被褐懷玉蒙以養正知不知上不知知病知之如不知則速怨不知而强知則招患夫唯病病是以不病聖人之不病以其病病是以不病病人能自知其病斯不甚病矣民不畏威則大威至弗畏入畏無狹其所安不擇地而安之無厭其所生甘其食美其服夫惟不厭是以不厭不厭於物亦不為物所厭是以聖人自知不自見人不知而不愠自愛不自貴卑以自牧故去彼取此去外慕取內樂勇於敢則殺勇於不敢則活知此兩者或利或害天之所惡孰知其故是以聖人猶難之人知此而避殺就活是利也亦有知此而更速死者害也豈非天之惡人如此乎孰能知其意故哉是以聖人於天道亦不敢易言之天之道不爭而善勝任物自然物莫能違不言而善應隨其順逆應以吉凶不召而自來不疾而速不行而至繟然而善謀繟緩貌不忽遽而事無不成天網恢恢疏而不失恢恢大貌民常不畏死奈何以死懼之見利則忘生是不畏死若使人常畏死而為奇者吾得執而殺之夫孰敢也奇邪也常有司殺者殺天將去惡必假手於一人夫代司殺者殺是謂代大匠斫者希不自傷其手矣妄作凶民之飢以其上食稅之多是以飢民之難治以其上之有為是以難治擾之故難治民之輕死以其求生之厚是以輕死求利所以養生也而民常以利喪其生夫唯無以生為者是賢於貴生外其身而身存民之生也柔弱其死也堅强萬物草木生也柔脆其死枯槁故堅强者死之徒柔弱者生之徒是以兵强則不勝兵驕者滅木强則共强大處下柔弱處上天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者與之虧盈益謙天之道損有餘補不足人之道則不然損不足以奉有餘以貴抑賤以富奪貧以智加愚以賢陵不肖孰能以有餘奉天下唯有道者是以聖人為而不恃功成不處其不欲見賢邪聖人功德有餘故推以與人天下柔弱莫過於水而攻堅强者莫之能勝以其無以易之也故柔勝剛弱勝强天下莫不知莫能行是以聖人之言云受國之垢是謂社稷主受國不祥是謂天下王故正言若反也含垢納污乃能成其大和大怨者必有餘怨安可以為善是以聖人執左契而不責於人故有德司契無德司徹天道無親常與善人小國寡民使有什伯之器而不用使民重死而不重復愛生安土雖有舟輿無所乘之不遷雖有甲兵無所陳之不爭使民復結繩而用之不相欺甘其食美其服安其居樂其俗雖疏惡隘陋自以為甘美安樂鄰國相望雞犬之音相聞信近民至老死不相往來無求信言不美質直美言不信華巧善者不辨吉人寡辭辨者不善盜言孔甘知者不博一以貫之博者不知多岐亡羊聖人不積不私無物既以為人己愈有德智無窮既以與人己愈多損之而益天之道利而不害春生秋成以美利利天下聖人之道為而不爭不能無為然輔而不强道德真經論卷之四
