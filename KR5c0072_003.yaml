front:
  text: 道德真經論卷之三四同卷得二
  hash: sha256:58962a19fe13cca247e61e53e863e59b9b35f19941390e4ed71b27bd51b7ba64
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0072_HFL_003-001a, image: hfl/0373/0373-034.png}
body:
  text: 司馬氏注上德不德是以有德推至誠而行之不自以為德下德不失德是以無德慕德之名循其迹而求之上德無為而無以為我無為民自化無以為猶言無用有為也下德為之而有以為有為之德不修則廢上仁為之而無以為因民所利而利之上義為之而有以為制而用之上禮為之而莫之應則攘臂而仍之立制度以強民民不肯從則用刑以威之仍引也字或作扔故失道而後德道無形德無迹失德而後仁魚相喣以沫失仁而後義恩不能懷必加裁制失義而後禮制其外貌夫禮者忠信之薄而亂之首也忠信禮之本也守其文忘其本則巧偽橫生矣前識者道之華而愚之始也世有億度屢中者人或謂之智而多言數窮未免於愚也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下正其致之一也一者道之子物之祖也故莫不賴之以成功以事言之常久不已所謂一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貴高將恐蹶離本失道不常故也故貴必以賤為本高必以下為基是以侯王自謂孤寡不穀此其以賤為邪非乎不敢忘本故致數輿無輿式較軹轛各指其名則無復輿矣不欲琭琭如玉落落如石反者道之動一陰一陽之謂道弱者道之用天下之物生於有有生於無上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道非常之道固非常人所知故建言有之古之立言明道若昧進道若退夷道若類纇絲節也上德若谷大白若辱廣德若不足建德若偷質直若渝大方無隅大器晚成大音希聲大象無形道隱無名夫唯道善貸且成物賴以成而不能有故謂之貸道生一自無入有一生二分陰分陽二生三濟以中和三生萬物萬物負陰而抱陽負猶背也抱猶嚮也沖氣以為和萬物莫不以陰陽為體以沖氣為用人之所惡唯孤寡不穀而王公以為稱故物或損之而益益之而損滿招損謙受益皆所以去甚泰就中和人之所教亦我教之亦我教之猶言我亦教之強梁者不得其死吾將以為教父為衆教之父天下之至柔馳騁天下之至堅泰山之溜穿石無有入於無間吾是以知無為之有益形之細者無若微塵然不能入無隙之物唯無有乃可以入於無間不言之教無為之益天下希及之知之者鮮名與身孰親身與貨孰多得與亡孰病得名貨而亡身與身而亡名貨二者孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長久大成若缺其用不弊大盈若沖其用不窮物成必毁盈必溢理之常也有道者雖成若缺雖盈若沖故不弊不窮大直若屈大巧若拙大辨若訥躁勝寒動作靜勝熱無為清靜為天下正虛靜以觀萬物天下有道卻走馬以糞無求不爭舍外修內天下無道戎馬生於郊食欲無厭舍內競外罪莫大於可欲匹夫無罪懷璧其罪禍莫大於不知足咎莫大於欲得故知足常足矣不出户知天下不窺牖見天道得其宗本其出彌遠其知彌少去本逐末是以聖人不行而知不見而名至理不易不為而成為學日益為道日損去其浮冗損之又損之以至於無為無為而無不為矣跂者不立跨者不行有為則滯閡於一隅故無為則無不為矣故取天下者常以無事使天下自歸之及其有事不足以取天下強之則物不從聖人無常心以百姓心為心隨時因物應變從道善者吾善之不善者吾亦善之得善矣信者吾信之不信者吾亦信之得信矣彼雖不善吾自為善以接之不失其善矣彼雖不信吾自守信以待之不失其信矣聖人在天下惵惵焉為天下渾其心渾其心無所間别百姓皆注其耳目焉則而象之聖人皆孩之愛之如赤子出入生死出生地則入死地生之徒十有三死之徒十有三人之生動之死地十有三夫何故以其生生之厚言十人之中大約柔弱以保其生者三剛強以速其死者三雖志在愛生而不免於趨死者亦三其所以愛生而趨死者由其自奉養太厚故也蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地兕虎以喻強暴處強暴之間而不見害者以其柔順不爭故也道生之宗本無形謂之道德畜之氣象變化謂之德物形之聚而成物質性散殊勢成之生必長長必成自然之勢是以萬物莫不尊道而貴德為之父母道之尊德之貴夫莫之爵而常自然聖人道德洽於天下其為人所推戴亦然故道生之畜之長之育之成之熟之養之覆之及其成功皆歸於道生而不有為而不恃長而不宰是謂玄德天下有始以為天下母始謂道也道者萬物之所生既得其母以知其子因道以立禮樂刑政既知其子復守其母沒身不殆不可忘本棄道塞其兊閉其門終身不勤開其兊濟其事終身不救見小曰明守柔曰強用其光復歸其明無遺身殃是謂襲常光外燭明內景使我介然有知行於大道唯施是畏大道甚夷民甚好徑道本簡易由人之好鑿故失道朝甚除田甚蕪倉甚虛失道之國好察近而遺遠逐末而忘本故視其朝若修治而察其民實貧困服文彩帶利劍厭飲食財貨有餘是謂盜誇取非其有謂之盜德薄位尊智小謀大危亡將及曾不自知乃更矜誇以為得意服美不稱積實無厭故曰盜誇盜誇非道也哉所以有此誇者豈非本欲行道而更鑿以致失哉善建者不拔深根固蒂不可動搖善抱者不脫民心懷服不可傾奪子孫祭祀不輟享祚久長修之身其德乃真修之家其德乃餘餘當作賒修之鄉其德乃長修之國其德乃豐修之天下其德乃普皆循本以治末由近以及遠故以身觀身以家觀家以鄉觀鄉以國觀國如一以天下觀天下以古況今吾何以知天下之然哉以此以一知萬含德之厚者比於赤子毒蟲不螫猛獸不據攫鳥不搏言和厚之至者雖忮夫所不忍害骨弱筋柔而握固未知牝牡之合而脧作精之至也終日號而不嗄和之至也皆在其自然知和曰常知常曰明益生曰祥祥善也和之善者可以益生心使氣曰強志氣之率也心動則氣亂氣亂則昏心不能制故有悖暴之行衆人皆以氣盛者為強老子獨以心能使氣者為強也物壯則老是謂不道不道早已不用其壯可以後亡知者不言得之於內言者不知求之於外塞其兊閉其門不出入挫其鋭解其紛和其光同其塵是謂玄同玄者極深固者無外故不可得而親亦不可得而疏不可得而利亦不可得而害不可得而貴亦不可得而賤守道故不動故為天下貴以正治國政者正也以奇用兵兵家尚詐以無事取天下吾何以知其然哉夫天下多忌諱而民彌貧民多利器國家滋昏民多伎巧奇物滋起法令滋彰盜賊多有法出姦生故聖人云我無為而民自化我無事而民自富安而勿擾我好靜而民自正正己而物正我無欲而民自朴雖賞之不竊其政悶悶其民淳淳責大體而已其政察察其民缺缺政苛則無完人禍兮福所倚福兮禍所伏孰知其極其無正邪禍中有福福中有禍天下無正禍正福正復為奇善復為妖非獨禍福為然邪正善惡亦常反覆皆由物極則反民之迷也其日固久天下莫能知之是以聖人方而不割廉而不劌劌刮也直而不肆光而不耀皆不欲至其極道德真經論卷之三
